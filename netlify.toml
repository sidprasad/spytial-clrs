[build]
  # Base directory for the build
  base = ""
  
  # Directory where the built site will be
  publish = "_output"
  
  # Build command - use consistent python -m invocations
  command = """
    python -m pip install --upgrade pip && \
    python -m pip install jupyterlite-core jupyterlite-pyodide-kernel jupyter-server && \
    python -m jupyter lite build --contents src --output-dir _output && \
    python fix_jupyterlite_paths.py
  """

# Redirect root to /lab
[[redirects]]
  from = "/"
  to = "/lab/index.html"
  status = 302

# Security headers + safe default caching.
# Default everything to "no-cache": the browser may store a copy but must
# revalidate before use (cheap 304s), so entry-point HTML, config, content,
# and the service worker are never served stale after a redeploy.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "no-cache"

# Content-hashed build assets (e.g. /build/100.fc995bd.js). The hash changes
# when the content does, so these are safe to cache forever. This is the bulk
# of the site weight and the only thing that should be immutable.
[[headers]]
  for = "/build/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Pyodide/kernel wasm is versioned and stable.
[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"
    Cache-Control = "public, max-age=31536000, immutable"
