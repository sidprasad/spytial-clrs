name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine arch tag
        id: arch
        run: |
          if [ "${{ matrix.platform }}" = "linux/amd64" ]; then
            echo "suffix=amd64" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            sidprasad/spytial-clrs:${{ github.sha }}-${{ steps.arch.outputs.suffix }}
            sidprasad/spytial-clrs:latest-${{ steps.arch.outputs.suffix }}
          cache-from: type=gha,scope=${{ steps.arch.outputs.suffix }}
          cache-to: type=gha,mode=max,scope=${{ steps.arch.outputs.suffix }}
